<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MTCNA – Test 30 pytań</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #16161e;
    --bg2:       #1e1e2a;
    --bg3:       #252535;
    --border:    #2e2e42;
    --text:      #d4d4e8;
    --muted:     #6c6c8a;
    --accent:    #e05a5a;
    --accent-h:  #c94444;
    --correct:   #2a6e3a;
    --correct-t: #5dd87a;
    --wrong:     #6e2a2a;
    --wrong-t:   #f07070;
    --dim:       0.32;
    --radius:    12px;
    --pad-x:     clamp(14px, 3vw, 40px);
    --pad-y:     clamp(16px, 2.5vh, 32px);
    --gap:       clamp(8px, 1.5vw, 14px);
    --test-size: 30;
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: clamp(15px, 1.5vw + 10px, 18px);
    line-height: 1.5;
  }
  body { display: flex; justify-content: center; min-height: 100dvh; }
  #app {
    width: 100%;
    max-width: 680px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: var(--pad-y) var(--pad-x) max(var(--pad-y), env(safe-area-inset-bottom, 16px));
  }

  /* header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: clamp(14px, 2.5vh, 24px);
    flex-shrink: 0;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: clamp(12px, 1.5vw, 14px);
    font-weight: 600; color: var(--muted);
    text-decoration: none; letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent; padding: 6px 0;
  }
  .back-btn:active { color: var(--text); }
  .test-counter {
    font-size: clamp(12px, 1.5vw, 14px);
    font-weight: 700; color: var(--muted);
    letter-spacing: 0.5px;
  }
  .test-counter b { color: var(--text); }

  /* progress */
  .progress-wrap {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: clamp(16px, 2.5vh, 28px);
    overflow: hidden; flex-shrink: 0;
  }
  .progress-bar {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width 0.4s ease; width: 0%;
  }

  /* question card */
  .q-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: clamp(14px, 2vw, 22px);
    margin-bottom: var(--gap);
  }
  .q-meta {
    font-size: clamp(10px, 1.2vw, 12px); font-weight: 700;
    letter-spacing: 1px; color: var(--muted);
    text-transform: uppercase; margin-bottom: 8px;
  }
  .q-text { font-size: clamp(15px, 1.5vw + 10px, 18px); color: var(--text); line-height: 1.6; }

  /* options */
  .options { display: flex; flex-direction: column; gap: var(--gap); margin-bottom: var(--gap); }
  .opt {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: clamp(12px, 1.8vw, 18px) clamp(12px, 2vw, 20px);
    cursor: pointer; display: flex; align-items: flex-start;
    gap: clamp(10px, 1.5vw, 16px); text-align: left;
    color: var(--text); font-size: clamp(14px, 1.4vw + 9px, 17px);
    line-height: 1.45; width: 100%; min-height: 52px;
    transition: background 0.12s, border-color 0.12s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt:active:not([disabled]) { background: var(--bg3); }
  .opt-letter {
    min-width: clamp(22px, 3vw, 30px); height: clamp(22px, 3vw, 30px);
    border-radius: 6px; background: var(--bg3); border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(11px, 1.2vw, 13px); font-weight: 700; color: var(--muted);
    flex-shrink: 0; margin-top: 2px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .opt.correct { background: var(--correct); border-color: var(--correct-t); }
  .opt.correct .opt-letter { background: var(--correct-t); border-color: var(--correct-t); color: #0a2e15; }
  .opt.wrong   { background: var(--wrong);   border-color: var(--wrong-t); }
  .opt.wrong .opt-letter   { background: var(--wrong-t); border-color: var(--wrong-t); color: #2e0a0a; }
  .opt.dimmed  { opacity: var(--dim); cursor: default; }
  .opt[disabled] { cursor: default; }

  /* result */
  .result-msg {
    text-align: center; font-size: clamp(13px, 1.5vw, 15px); font-weight: 700;
    min-height: 20px; margin-bottom: var(--gap); letter-spacing: 0.2px;
  }
  .result-msg.ok  { color: var(--correct-t); }
  .result-msg.err { color: var(--wrong-t); }
  .explanation {
    background: var(--bg2); border: 1px solid var(--border);
    border-left: 3px solid var(--wrong-t); border-radius: var(--radius);
    padding: clamp(10px, 1.5vw, 16px);
    font-size: clamp(12px, 1.3vw, 14px); color: var(--muted);
    line-height: 1.6; margin-bottom: var(--gap); display: none;
  }

  /* buttons */
  .btn-main {
    background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius);
    font-size: clamp(13px, 1.5vw, 15px); font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    padding: clamp(14px, 2vh, 18px) 16px;
    width: 100%; cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    display: none;
  }
  .btn-main:active { transform: scale(0.98); background: var(--accent-h); }
  .btn-main.visible { display: block; }

  /* tablet 2-col */
  @media (min-width: 700px) {
    #quiz-inner { display: grid; grid-template-columns: 1fr 1fr; column-gap: 20px; align-items: start; }
    .q-card  { grid-column: 1 / -1; }
    #options { grid-column: 1; margin-bottom: 0; }
    #right-col { grid-column: 2; display: flex; flex-direction: column; gap: var(--gap); }
    #btn-row { grid-column: 1 / -1; margin-top: 20px; }
    .btn-main { margin-top: 0; }
  }

  /* screens */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* loading */
  .state-center {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--muted);
    font-size: clamp(13px, 1.5vw, 15px); text-align: center; padding: 40px 0;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* summary */
  #screen-summary {
    align-items: center; justify-content: center;
    gap: clamp(12px, 2vh, 20px); text-align: center;
    padding: 20px 0;
  }
  .sum-ring { position: relative; width: clamp(110px, 20vw, 150px); height: clamp(110px, 20vw, 150px); }
  .sum-ring svg { transform: rotate(-90deg); width: 100%; height: 100%; }
  .sum-ring-bg { fill: none; stroke: var(--border); stroke-width: 8; }
  .sum-ring-fg { fill: none; stroke: var(--accent); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset 0.8s ease; }
  .sum-pct { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: clamp(24px, 4vw, 34px); font-weight: 700; color: var(--text); }
  .sum-label   { font-size: clamp(10px, 1.2vw, 12px); letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .sum-verdict { font-size: clamp(16px, 2.5vw, 22px); font-weight: 700; }
  .sum-verdict.pass { color: var(--correct-t); }
  .sum-verdict.fail { color: var(--wrong-t); }
  .sum-detail  { font-size: clamp(13px, 1.5vw, 16px); color: var(--text); }
  .sum-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: clamp(12px, 1.3vw, 14px); font-weight: 600;
    letter-spacing: 1px; text-transform: uppercase;
    padding: clamp(11px, 1.6vh, 14px) 16px;
    width: 100%; cursor: pointer;
    transition: background 0.12s, color 0.12s;
    -webkit-tap-highlight-color: transparent;
    text-decoration: none; display: flex; align-items: center; justify-content: center;
  }
  .btn-ghost:active { background: var(--bg3); color: var(--text); }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <a class="back-btn" href="index.html">‹ Menu</a>
    <div class="test-counter"><b id="q-num">0</b> / <b id="q-total">30</b></div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>

  <!-- loading -->
  <div class="state-center" id="loading">
    <div class="spinner"></div>
    <div>Ładowanie pytań…</div>
  </div>
  <div class="state-center" id="error" style="display:none">
    <div style="font-size:32px">⚠️</div>
    <div id="error-msg">Nie można załadować questions.txt</div>
  </div>

  <!-- quiz -->
  <div class="screen" id="screen-quiz">
    <div id="quiz-inner">
      <div class="q-card">
        <div class="q-meta" id="q-meta"></div>
        <div class="q-text" id="q-text"></div>
      </div>
      <div class="options" id="options"></div>
      <div id="right-col">
        <div class="result-msg" id="result-msg"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div id="btn-row">
        <button class="btn-main" id="btn-next" onclick="handleNext()">Następne pytanie</button>
      </div>
    </div>
  </div>

  <!-- summary -->
  <div class="screen" id="screen-summary">
    <div class="sum-ring">
      <svg viewBox="0 0 130 130">
        <circle class="sum-ring-bg" cx="65" cy="65" r="55"/>
        <circle class="sum-ring-fg" id="sum-ring-fg" cx="65" cy="65" r="55"
          stroke-dasharray="345.4" stroke-dashoffset="345.4"/>
      </svg>
      <div class="sum-pct" id="sum-pct">0%</div>
    </div>
    <div class="sum-label">WYNIK TESTU</div>
    <div class="sum-verdict" id="sum-verdict"></div>
    <div class="sum-detail" id="sum-detail"></div>
    <div class="sum-btns">
      <button class="btn-main visible" onclick="restartTest()">Powtórz test</button>
      <a class="btn-ghost" href="index.html">‹ Menu główne</a>
    </div>
  </div>

</div>
<script>
const LETTERS     = ['A','B','C','D','E'];
const TEST_SIZE   = 30;
const CIRCUMFERENCE = 2 * Math.PI * 55;

let allQuestions = [], testPool = [];
let current = null, answered = false;
let askedCount = 0, goodCount = 0, badCount = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function parseQuestions(text) {
  return text.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0 && !l.startsWith('#'))
    .map((line, idx) => {
      const parts = line.split(';');
      if (parts.length < 4) return null;
      const question  = parts[0].trim();
      const options   = parts.slice(1, parts.length - 1).map(o => o.trim());
      const answer    = parts[parts.length - 1].trim();
      const answerIdx = options.findIndex(o => o === answer);
      if (!question || options.length < 2 || answerIdx === -1) return null;
      return { id: idx + 1, question, options, answerIdx };
    }).filter(Boolean);
}

async function loadQuestions() {
  try {
    const res = await fetch('questions.txt');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allQuestions = parseQuestions(await res.text());
    if (!allQuestions.length) throw new Error('Brak pytań w pliku');
    document.getElementById('loading').style.display = 'none';
    const n = Math.min(TEST_SIZE, allQuestions.length);
    document.getElementById('q-total').textContent = n;
    startTest();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
    document.getElementById('error-msg').textContent = e.message;
  }
}

function startTest() {
  askedCount = goodCount = badCount = 0;
  testPool = shuffle([...allQuestions]).slice(0, Math.min(TEST_SIZE, allQuestions.length));
  document.getElementById('sum-ring-fg').style.strokeDashoffset = CIRCUMFERENCE;
  document.getElementById('screen-summary').classList.remove('active');
  document.getElementById('screen-quiz').classList.add('active');
  document.getElementById('progress').style.width = '0%';
  document.getElementById('q-num').textContent = '0';
  nextQuestion();
}

function nextQuestion() {
  if (askedCount >= testPool.length) { showSummary(); return; }

  current  = testPool[askedCount];
  answered = false;
  askedCount++;

  const indices = current.options.map((_, i) => i);
  shuffle(indices);
  current._opts = indices.map(i => current.options[i]);
  current._ans  = indices.indexOf(current.answerIdx);

  const n = testPool.length;
  document.getElementById('q-meta').textContent = 'Pytanie ' + askedCount + ' / ' + n;
  document.getElementById('q-num').textContent  = askedCount;
  document.getElementById('q-text').textContent = current.question;
  document.getElementById('result-msg').textContent = '';
  document.getElementById('result-msg').className = 'result-msg';
  document.getElementById('explanation').style.display = 'none';

  document.getElementById('progress').style.width = ((askedCount - 1) / n * 100) + '%';

  const btn = document.getElementById('btn-next');
  btn.classList.remove('visible');
  btn.textContent = askedCount < n ? 'Następne pytanie' : 'Zobacz wynik';

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  current._opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = '<span class="opt-letter">' + LETTERS[i] + '</span><span>' + opt + '</span>';
    b.onclick = () => selectAnswer(i);
    optDiv.appendChild(b);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;

  const btns = document.querySelectorAll('.opt');
  const isCorrect = idx === current._ans;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === current._ans) b.classList.add('correct');
    else if (i === idx)     b.classList.add('wrong');
    else                    b.classList.add('dimmed');
  });

  const msg = document.getElementById('result-msg');
  if (isCorrect) {
    goodCount++;
    msg.textContent = '✓ Poprawna odpowiedź!';
    msg.className = 'result-msg ok';
  } else {
    badCount++;
    msg.textContent = '✗ Nieprawidłowa odpowiedź!';
    msg.className = 'result-msg err';
    const exp = document.getElementById('explanation');
    exp.textContent = 'Poprawna odpowiedź: ' + current._opts[current._ans];
    exp.style.display = 'block';
  }

  document.getElementById('progress').style.width = (askedCount / testPool.length * 100) + '%';
  document.getElementById('btn-next').classList.add('visible');
}

function handleNext() {
  if (!answered) return;
  nextQuestion();
}

function showSummary() {
  document.getElementById('screen-quiz').classList.remove('active');

  const n       = testPool.length;
  const pct     = Math.round((goodCount / n) * 100);
  const passing = pct >= 60;

  document.getElementById('sum-pct').textContent     = pct + '%';
  document.getElementById('sum-verdict').textContent = passing ? '✓ Zaliczony' : '✗ Niezaliczony';
  document.getElementById('sum-verdict').className   = 'sum-verdict ' + (passing ? 'pass' : 'fail');
  document.getElementById('sum-detail').textContent  = 'Poprawne: ' + goodCount + ' / ' + n + '  ·  Błędne: ' + badCount;

  const fg = document.getElementById('sum-ring-fg');
  fg.style.stroke = passing ? 'var(--correct-t)' : 'var(--wrong-t)';
  setTimeout(() => { fg.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct / 100); }, 50);

  document.getElementById('screen-summary').classList.add('active');
}

function restartTest() { startTest(); }

loadQuestions();
</script>
</body>
</html>
