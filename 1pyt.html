<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MTCNA – Losuj pytanie</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #16161e;
    --bg2:       #1e1e2a;
    --bg3:       #252535;
    --border:    #2e2e42;
    --text:      #d4d4e8;
    --muted:     #6c6c8a;
    --accent:    #e05a5a;
    --accent-h:  #c94444;
    --correct:   #2a6e3a;
    --correct-t: #5dd87a;
    --wrong:     #6e2a2a;
    --wrong-t:   #f07070;
    --dim:       0.32;
    --radius:    12px;
    --pad-x:     clamp(14px, 3vw, 40px);
    --pad-y:     clamp(16px, 2.5vh, 32px);
    --gap:       clamp(8px, 1.5vw, 14px);
  }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    font-size: clamp(15px, 1.5vw + 10px, 18px);
    line-height: 1.5;
  }
  body { display: flex; justify-content: center; min-height: 100dvh; }
  #app {
    width: 100%;
    max-width: 680px;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    padding: var(--pad-y) var(--pad-x) max(var(--pad-y), env(safe-area-inset-bottom, 16px));
  }

  /* header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: clamp(14px, 2.5vh, 24px);
    flex-shrink: 0;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: clamp(12px, 1.5vw, 14px);
    font-weight: 600;
    color: var(--muted);
    text-decoration: none;
    letter-spacing: 0.5px;
    -webkit-tap-highlight-color: transparent;
    padding: 6px 0;
  }
  .back-btn:active { color: var(--text); }
  .stats {
    display: flex;
    gap: 14px;
    font-size: clamp(12px, 1.5vw, 14px);
    color: var(--muted);
  }
  .stats .ok b  { color: #5dd87a; font-weight: 700; }
  .stats .err b { color: #f07070; font-weight: 700; }

  /* progress */
  .progress-wrap {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: clamp(16px, 2.5vh, 28px);
    overflow: hidden;
    flex-shrink: 0;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* question card */
  .q-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: clamp(14px, 2vw, 22px);
    margin-bottom: var(--gap);
  }
  .q-meta {
    font-size: clamp(10px, 1.2vw, 12px);
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: clamp(15px, 1.5vw + 10px, 18px);
    color: var(--text);
    line-height: 1.6;
  }

  /* options */
  .options { display: flex; flex-direction: column; gap: var(--gap); margin-bottom: var(--gap); }
  .opt {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: clamp(12px, 1.8vw, 18px) clamp(12px, 2vw, 20px);
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: clamp(10px, 1.5vw, 16px);
    text-align: left;
    color: var(--text);
    font-size: clamp(14px, 1.4vw + 9px, 17px);
    line-height: 1.45;
    width: 100%;
    min-height: 52px;
    transition: background 0.12s, border-color 0.12s, opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .opt:active:not([disabled]) { background: var(--bg3); }
  .opt-letter {
    min-width: clamp(22px, 3vw, 30px);
    height: clamp(22px, 3vw, 30px);
    border-radius: 6px;
    background: var(--bg3);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(11px, 1.2vw, 13px);
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
    margin-top: 2px;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }
  .opt.correct { background: var(--correct); border-color: var(--correct-t); }
  .opt.correct .opt-letter { background: var(--correct-t); border-color: var(--correct-t); color: #0a2e15; }
  .opt.wrong   { background: var(--wrong);   border-color: var(--wrong-t); }
  .opt.wrong .opt-letter   { background: var(--wrong-t);   border-color: var(--wrong-t);   color: #2e0a0a; }
  .opt.dimmed  { opacity: var(--dim); cursor: default; }
  .opt[disabled] { cursor: default; }

  /* result */
  .result-msg {
    text-align: center;
    font-size: clamp(13px, 1.5vw, 15px);
    font-weight: 700;
    min-height: 20px;
    margin-bottom: var(--gap);
    letter-spacing: 0.2px;
  }
  .result-msg.ok  { color: var(--correct-t); }
  .result-msg.err { color: var(--wrong-t); }

  .explanation {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--wrong-t);
    border-radius: var(--radius);
    padding: clamp(10px, 1.5vw, 16px);
    font-size: clamp(12px, 1.3vw, 14px);
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: var(--gap);
    display: none;
  }

  /* buttons */
  .btn-next {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    font-size: clamp(13px, 1.5vw, 15px);
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: clamp(14px, 2vh, 18px) 16px;
    width: 100%;
    cursor: pointer;
    transition: background 0.12s, transform 0.1s;
    margin-top: auto;
    display: none;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-next:active { transform: scale(0.98); background: var(--accent-h); }
  .btn-next.visible { display: block; }

  /* tablet 2-col */
  @media (min-width: 700px) {
    #quiz-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      column-gap: 20px;
      align-items: start;
    }
    .q-card   { grid-column: 1 / -1; }
    #options  { grid-column: 1; margin-bottom: 0; }
    #right-col{ grid-column: 2; display: flex; flex-direction: column; gap: var(--gap); }
    #btn-row  { grid-column: 1 / -1; margin-top: 20px; }
    .btn-next { margin-top: 0; }
  }

  /* loading/error */
  .state-center {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; color: var(--muted);
    font-size: clamp(13px, 1.5vw, 15px);
    text-align: center; padding: 40px 0;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <a class="back-btn" href="index.html">‹ Menu</a>
    <div class="stats" id="stats-bar">
      <span class="ok">✓ <b id="s-good">0</b></span>
      <span class="err">✗ <b id="s-bad">0</b></span>
      <span id="s-total" style="color:var(--muted)">0 pyt.</span>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress"></div>
  </div>

  <div class="state-center" id="loading">
    <div class="spinner"></div>
    <div>Ładowanie pytań…</div>
  </div>

  <div class="state-center" id="error" style="display:none">
    <div style="font-size:32px">⚠️</div>
    <div id="error-msg">Nie można załadować questions.txt</div>
  </div>

  <div id="quiz" style="display:none; flex-direction:column; flex:1">
    <div id="quiz-inner">
      <div class="q-card">
        <div class="q-meta" id="q-meta"></div>
        <div class="q-text" id="q-text">Naciśnij przycisk poniżej, aby wylosować pierwsze pytanie.</div>
      </div>
      <div class="options" id="options"></div>
      <div id="right-col">
        <div class="result-msg" id="result-msg"></div>
        <div class="explanation" id="explanation"></div>
      </div>
      <div id="btn-row">
        <button class="btn-next visible" id="btn-next" onclick="handleBtn()">WYLOSUJ PYTANIE</button>
      </div>
    </div>
  </div>

</div>
<script>
const LETTERS = ['A','B','C','D','E'];
let allQuestions = [], pool = [], current = null;
let answered = false, askedCount = 0, goodCount = 0, badCount = 0;

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function parseQuestions(text) {
  return text.split('\n')
    .map(l => l.trim())
    .filter(l => l.length > 0 && !l.startsWith('#'))
    .map((line, idx) => {
      const parts = line.split(';');
      if (parts.length < 4) return null;
      const question  = parts[0].trim();
      const options   = parts.slice(1, parts.length - 1).map(o => o.trim());
      const answer    = parts[parts.length - 1].trim();
      const answerIdx = options.findIndex(o => o === answer);
      if (!question || options.length < 2 || answerIdx === -1) return null;
      return { id: idx + 1, question, options, answerIdx };
    }).filter(Boolean);
}

async function loadQuestions() {
  try {
    const res = await fetch('questions.txt');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    allQuestions = parseQuestions(await res.text());
    if (!allQuestions.length) throw new Error('Brak pytań w pliku');
    document.getElementById('loading').style.display = 'none';
    document.getElementById('quiz').style.display = 'flex';
    document.getElementById('s-total').textContent = '0 / ' + allQuestions.length;
    pool = shuffle([...allQuestions]);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'flex';
    document.getElementById('error-msg').textContent = e.message;
  }
}

function nextQuestion() {
  if (pool.length === 0) pool = shuffle([...allQuestions]);
  current  = pool.pop();
  answered = false;
  askedCount++;

  const indices = current.options.map((_, i) => i);
  shuffle(indices);
  current._opts = indices.map(i => current.options[i]);
  current._ans  = indices.indexOf(current.answerIdx);

  document.getElementById('q-meta').textContent =
    'Pytanie ' + askedCount + ' · pula: ' + allQuestions.length;
  document.getElementById('q-text').textContent = current.question;
  document.getElementById('result-msg').textContent = '';
  document.getElementById('result-msg').className = 'result-msg';
  document.getElementById('explanation').style.display = 'none';
  document.getElementById('s-total').textContent = askedCount + ' / ' + allQuestions.length;

  const pct = ((allQuestions.length - pool.length) / allQuestions.length) * 100;
  document.getElementById('progress').style.width = pct + '%';

  const btn = document.getElementById('btn-next');
  btn.textContent = 'WYLOSUJ PYTANIE';
  btn.classList.remove('visible');

  const optDiv = document.getElementById('options');
  optDiv.innerHTML = '';
  current._opts.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.innerHTML = '<span class="opt-letter">' + LETTERS[i] + '</span><span>' + opt + '</span>';
    b.onclick = () => selectAnswer(i);
    optDiv.appendChild(b);
  });
}

function selectAnswer(idx) {
  if (answered) return;
  answered = true;
  const btns = document.querySelectorAll('.opt');
  const isCorrect = idx === current._ans;
  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === current._ans)    b.classList.add('correct');
    else if (i === idx)        b.classList.add('wrong');
    else                       b.classList.add('dimmed');
  });
  const msg = document.getElementById('result-msg');
  if (isCorrect) {
    goodCount++;
    msg.textContent = '✓ Poprawna odpowiedź!';
    msg.className = 'result-msg ok';
  } else {
    badCount++;
    msg.textContent = '✗ Nieprawidłowa odpowiedź!';
    msg.className = 'result-msg err';
    const exp = document.getElementById('explanation');
    exp.textContent = 'Poprawna odpowiedź: ' + current._opts[current._ans];
    exp.style.display = 'block';
  }
  document.getElementById('s-good').textContent = goodCount;
  document.getElementById('s-bad').textContent  = badCount;
  const btn = document.getElementById('btn-next');
  btn.textContent = 'DAWAJ NASTĘPNE!';
  btn.classList.add('visible');
}

function handleBtn() {
  nextQuestion();
}

loadQuestions();
</script>
</body>
</html>
